# payments.yaml — Payment transactions
table: payments
description: "Payment transactions"
source: landing/payments
primary_key: payment_id
dedup_order_by: ingestion_ts DESC

dq_rules:
  not_null: [payment_id, order_id, payment_date, amount]
  positive: [amount]
  accepted_values:
    status: [completed, pending, failed, refunded]
    payment_method: [Credit Card, Debit Card, PayPal, Bank Transfer, Apple Pay, Google Pay, Crypto]

type_overrides:
  amount: double

schema_evolution:
  allowed: [add_column, type_widen]
  blocked: [drop_column, type_narrow]
