# ============================================================
# bt-df-lkhouse-fw Pipeline Configuration (Global)
# Tables: config/tables/*.yaml (drop & go)
# Consumption: config/consumption/*.sql (drop & go)
# ============================================================

pipeline:
  name: ecommerce
  description: "E-Commerce lakehouse with schema evolution"
  catalog: lakehouse
  bucket: ${PROJECT_ID}-lakehouse
  project_id: ${PROJECT_ID}
  region: ${REGION}

  # Layer storage
  landing_path: gs://${BUCKET}/landing
  reservoir_path: gs://${BUCKET}/reservoir
  # CCN = Iceberg via BLMS
  ccn_namespace: ccn
  # Data Product = BigQuery native tables
  dataproduct_dataset: lakehouse_dataproduct
