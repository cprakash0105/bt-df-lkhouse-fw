  - id: investment_banking
    name: "Investment Banking"
    description: "Trade execution, portfolio management, deal pipeline, corporate actions"
    keywords: [trade, portfolio, deal, isin, blotter, holdings, corporate_action, dividend, merger, acquisition, kyc, lei, counterparty, desk]

data_domains:
  - id: customer
    name: "Customer"
    description: "All customer-related data"

  - id: finance
    name: "Finance"
    description: "Financial transactions, billing, payments"

  - id: product
    name: "Product"
    description: "Product and service catalog"

  - id: order
    name: "Order"
    description: "Order lifecycle data"

  - id: bureau
    name: "Bureau & External"
    description: "Third-party bureau feeds (credit, identity)"

  - id: digital
    name: "Digital & Clickstream"
    description: "Web/app interaction data"

  - id: banking
    name: "Banking & Deposits"
    description: "Core banking, accounts, deposits, fixed deposits"

  - id: lending
    name: "Lending"
    description: "Loans, repayments, origination"

  - id: payments
    name: "Payments"
    description: "Payment flows, UPI, NEFT, RTGS"

  - id: investment
    name: "Investment Banking"
    description: "Trades, portfolios, deals, corporate actions"

business_terms:
  # --- Customer Domain ---
  - id: customer_identifier
    name: "Customer Identifier"
    domain: customer
    synonyms: [customer_id, cust_id, cust_no, client_id, subscriber_id, acct_id]
    data_type: string
    information_type: Identifier
    is_pii: false
    is_key_candidate: true
    dq_rules:
      not_null: true
      unique: true

  - id: customer_name
    name: "Customer Name"
    domain: customer
    synonyms: [name, cust_name, cust_nm, full_name, customer_nm, client_name]
    data_type: string
    information_type: Dimension
    is_pii: true
    classification: PII
    dq_rules:
      not_null: true

  - id: customer_email
    name: "Customer Email"
    domain: customer
    synonyms: [email, email_addr, email_address, e_mail, mail]
    data_type: string
    information_type: Dimension
    is_pii: true
    classification: PII
    pattern: "^[\\w.+-]+@[\\w.-]+\\.[a-zA-Z]{2,}$"
    dq_rules:
      not_null: false
      format: email

  - id: customer_phone
    name: "Customer Phone"
    domain: customer
    synonyms: [phone, mobile, tel, telephone, phn_nbr, phone_number, mobile_no, contact_number]
    data_type: string
    information_type: Dimension
    is_pii: true
    classification: PII
    dq_rules:
      not_null: false

  - id: date_of_birth
    name: "Date of Birth"
    domain: customer
    synonyms: [dob, birth_date, birthdate, date_of_birth]
    data_type: date
    information_type: Temporal
    is_pii: true
    classification: PII
    dq_rules:
      not_null: false

  - id: pan_number
    name: "PAN Number"
    domain: customer
    synonyms: [pan, pan_no, pan_number, pan_card]
    data_type: string
    information_type: Identifier
    is_pii: true
    classification: PII
    pattern: "^[A-Z]{5}[0-9]{4}[A-Z]$"
    dq_rules:
      not_null: false
      format: pan

  - id: aadhaar_number
    name: "Aadhaar Number"
    domain: customer
    synonyms: [aadhaar, aadhar, aadhaar_no, uid]
    data_type: string
    information_type: Identifier
    is_pii: true
    classification: PII
    pattern: "^[0-9]{12}$"
    dq_rules:
      not_null: false

  - id: address
    name: "Address"
    domain: customer
    synonyms: [address, addr, street, address_line, postal_address, mailing_address]
    data_type: string
    information_type: Dimension
    is_pii: true
    classification: PII
    dq_rules:
      not_null: false

  - id: loyalty_tier
    name: "Loyalty Tier"
    domain: customer
    synonyms: [tier, loyalty_level, membership_tier, loyalty_tier]
    data_type: string
    information_type: Reference
    is_pii: false
    reference_code_set: loyalty_tiers
    dq_rules:
      not_null: false

  - id: region
    name: "Region"
    domain: customer
    synonyms: [region, area, zone, territory, geo]
    data_type: string
    information_type: Reference
    is_pii: false
    reference_code_set: bt_regions
    dq_rules:
      not_null: false

  # --- Finance Domain ---
  - id: transaction_amount
    name: "Transaction Amount"
    domain: finance
    synonyms: [amount, amt, total_amount, bill_amt, payment_amount, txn_amount, transaction_amt]
    data_type: double
    information_type: Measure
    is_pii: false
    dq_rules:
      not_null: true
      positive: true

  - id: currency_code
    name: "Currency Code"
    domain: finance
    synonyms: [currency, ccy, currency_code, curr_cd]
    data_type: string
    information_type: Reference
    is_pii: false
    reference_code_set: currency_codes
    dq_rules:
      not_null: false

  - id: payment_method
    name: "Payment Method"
    domain: finance
    synonyms: [payment_method, pay_method, payment_type, pay_type]
    data_type: string
    information_type: Reference
    is_pii: false
    reference_code_set: payment_methods
    dq_rules:
      not_null: false

  # --- Order Domain ---
  - id: order_identifier
    name: "Order Identifier"
    domain: order
    synonyms: [order_id, order_no, order_number, ord_id]
    data_type: string
    information_type: Identifier
    is_pii: false
    is_key_candidate: true
    dq_rules:
      not_null: true
      unique: true

  - id: order_status
    name: "Order Status"
    domain: order
