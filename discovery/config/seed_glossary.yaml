    data_type: string
    information_type: Reference
    is_pii: false
    reference_code_set: order_statuses
    dq_rules:
      not_null: true

  - id: order_date
    name: "Order Date"
    domain: order
    synonyms: [order_date, order_dt, ord_date, placed_date]
