  # --- Bureau Domain ---
  - id: credit_score
    name: "Credit Score"
    domain: bureau
    synonyms: [cibil_score, credit_score, fico_score, bureau_score, risk_score]
    data_type: integer
    information_type: Measure
    is_pii: false
    classification: Sensitive
    dq_rules:
      not_null: true
      range: [300, 900]

  - id: csat_score
    name: "CSAT Score"
    domain: customer
