# Seed Glossary — Bootstrap Knowledge Graph
# This file seeds the initial business terms, domains, reference sets.
# The graph grows as stewards approve new discoveries.

business_applications:
  - id: retail_commerce
    name: "Retail & Commerce"
    description: "Point of sale, online orders, returns, inventory for retail/apparel"
