  - id: product_name
    name: "Product Name"
    domain: product
    synonyms: [product_name, prod_name, item_name, product_title]
    data_type: string
    information_type: Dimension
    is_pii: false
    dq_rules:
      not_null: true

  - id: product_price
    name: "Product Price"
    domain: product
    synonyms: [price, unit_price, product_price, item_price, msrp]
    data_type: double
    information_type: Measure
    is_pii: false
    dq_rules:
      not_null: true
