  - id: hr
    name: "Human Resources"
    description: "Staff, roles, departments, payroll"

# Business terms — no synonyms intentionally.
# Synonym matching is disabled so the LLM drives all BDE suggestions.
# Terms grow organically in KC as stewards approve discoveries.
# These entries exist only to carry DQ rules, PII flags, and reference sets
# that the rules engine and profile enhancer can inherit once a KC term is matched.
business_terms: []

reference_code_sets:
  return_reasons: [wrong_size, defective, not_as_described, changed_mind, too_late, duplicate_order]
  loyalty_tiers: [Bronze, Silver, Gold, Platinum, Diamond]
  bt_regions: [North, South, Midlands, London, Scotland, Wales, East, West]
  order_statuses: [delivered, shipped, processing, cancelled, returned]
  order_channels: [web, mobile, store, phone, marketplace]
  payment_methods: [credit_card, debit_card, upi, net_banking, wallet, cod]
  currency_codes: [GBP, USD, EUR, INR, AUD, CAD, JPY]
  iso_country_codes: [GB, US, DE, FR, IN, AU, CA, JP, SG, AE]
  kyc_statuses: [verified, pending, rejected, expired]
  payment_statuses: [paid, overdue, partial, waived]
  priority_levels: [low, medium, high, critical]
  complaint_statuses: [open, in_progress, resolved, escalated, closed]
  upi_statuses: [success, failed, pending, declined]
  policy_statuses: [active, expired, cancelled, lapsed, surrendered]
  claim_statuses: [filed, under_review, approved, rejected, settled, closed]

data_classifications:
  - id: pii
    name: "PII"
    description: "Personally Identifiable Information"
    masking_required: true
    retention_policy: "7 years"

  - id: phi
    name: "PHI"
    description: "Protected Health Information"
    masking_required: true
    retention_policy: "10 years"

  - id: sensitive
    name: "Sensitive"
    description: "Business sensitive data"
    masking_required: false
    retention_policy: "5 years"

  - id: internal
    name: "Internal"
    description: "Internal use only"
    masking_required: false
    retention_policy: "3 years"

  - id: public
    name: "Public"
    description: "No restrictions"
    masking_required: false
    retention_policy: "indefinite"
