    is_pii: false
    reference_code_set: order_channels
    dq_rules:
      not_null: false

  # --- Product Domain ---
  - id: product_identifier
    name: "Product Identifier"
    domain: product
    synonyms: [product_id, prod_id, sku, item_id, product_code]
