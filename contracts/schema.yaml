# Data Contract Schema — bt-df-lkhouse-fw
# A data contract is the formal agreement between a data producer and consumers.
# Generated by Semantic Discovery on approval, enforced by the pipeline.

contract:
  # --- Metadata ---
  name: cibil_bureau_feed
  version: "1.0.0"
  status: active  # draft | active | deprecated | retired
  created_at: "2026-06-26T13:44:14Z"
  updated_at: "2026-06-26T18:54:06Z"

  owner:
    team: Bureau Data Team
    email: bureau-data-team@bank.com
    domain: Credit
    business_application: Credit Bureau Integration

  source:
    system: TransUnion CIBIL
    format: JSONL
    frequency: monthly
    landing_path: gs://bt-df-lkhouse-lakehouse/landing/cibil_bureau_feed/

  # --- Schema ---
  schema:
    primary_key: customer_id
    dedup_order_by: ingestion_ts DESC
    fields:
      - name: customer_id
        type: string
        business_term: Customer Identifier
        nullable: false
        unique: true
        description: "Internal customer reference"

      - name: pan_number
        type: string
        business_term: PAN Number
        nullable: true
        pii: true
        format: "^[A-Z]{5}[0-9]{4}[A-Z]$"
        description: "Permanent Account Number"

      - name: cibil_score
        type: integer
        business_term: Credit Score
        nullable: false
        range: [300, 900]
        description: "Credit score from bureau"

      - name: score_date
        type: date
        nullable: true
        description: "Date score was calculated"

      - name: enquiry_date
        type: date
        nullable: true
        description: "Date of bureau enquiry"

      - name: loan_amount_requested
        type: decimal
        business_term: Loan Amount
        nullable: false
        positive: true
        description: "Amount requested in loan application"

      - name: number_of_accounts
        type: integer
        nullable: true
        description: "Total credit accounts"

      - name: overdue_amount
        type: decimal
        nullable: true
        positive: true
        description: "Total overdue across accounts"

      - name: credit_utilization_pct
        type: decimal
        nullable: true
        range: [0, 100]
        description: "Credit utilization percentage"

      - name: account_type
        type: string
        nullable: true
        accepted_values: [home_loan, personal_loan, credit_card, auto_loan, business_loan]
        description: "Type of credit account"

      - name: dpd_30_plus_count
        type: integer
        nullable: true
        range: [0, 365]
        description: "Days past due 30+ count in last 12 months"

      - name: bureau_reference_id
        type: string
        business_term: Bureau Reference
        nullable: false
        unique: true
        description: "Bureau enquiry reference"

      - name: mobile_number
        type: string
        business_term: Customer Phone
        nullable: true
        pii: true
        description: "Customer mobile on bureau record"

      - name: email_address
        type: string
        business_term: Customer Email
        nullable: true
        pii: true
        format: email
        description: "Customer email on bureau record"

      - name: date_of_birth
        type: date
        business_term: Date of Birth
        nullable: true
        pii: true
        description: "Customer DOB from bureau"

  # --- Quality SLAs ---
  quality:
    completeness:
      target: 99.5%
      critical_fields: [customer_id, cibil_score, bureau_reference_id]

    validity:
      target: 98%
      rules:
        - field: cibil_score
          check: range
          params: [300, 900]
        - field: pan_number
          check: format
          params: "^[A-Z]{5}[0-9]{4}[A-Z]$"
        - field: email_address
          check: format
          params: email
        - field: loan_amount_requested
          check: positive

    uniqueness:
      target: 100%
      fields: [customer_id, bureau_reference_id]

    freshness:
      max_delay: 24h
      check_field: ingestion_ts

  # --- Governance ---
  governance:
    classification: PII
    pii_fields:
      - pan_number
      - mobile_number
      - email_address
      - date_of_birth

    masking:
      non_prod: required
      strategy:
        pan_number: hash
        mobile_number: last_4_digits
        email_address: partial
        date_of_birth: year_only

    retention:
      period: 7 years
      policy: RBI mandate for bureau data

    access:
      teams: [Credit Risk, Compliance, Data Engineering]
      role_required: bureau_data_reader

  # --- Schema Evolution ---
  evolution:
    allowed:
      - add_column
      - type_widen
    blocked:
      - drop_column
      - type_narrow
      - rename_column
    on_violation: fail_pipeline
    notification: bureau-data-team@bank.com

  # --- Consumers ---
  consumers:
    - name: loan_eligibility_360
      type: data_product
      dataset: lakehouse_dataproduct
      fields_used: [customer_id, cibil_score, enquiry_date]

    - name: credit_risk_model
      type: ml_pipeline
      fields_used: [cibil_score, number_of_accounts, overdue_amount, dpd_30_plus_count, credit_utilization_pct]

    - name: collections_dashboard
      type: report
      fields_used: [customer_id, cibil_score, overdue_amount, dpd_30_plus_count]

  # --- SLOs ---
  slo:
    availability: 99.9%
    freshness: 24h
    quality_score: 98%
    breach_notification: bureau-data-team@bank.com
