steps:
  # Deploy pipeline framework engine files to GCS (used by Dataproc)
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'cp'
      - '-r'
      - 'bt_df_lkhouse_fw/engine/*.py'
      - 'gs://bt-df-lkhouse-lakehouse/framework/engine/'

  # Package and upload framework zip (for imports)
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'cd /workspace && zip -r bt_df_lkhouse_fw.zip bt_df_lkhouse_fw/ && gsutil cp bt_df_lkhouse_fw.zip gs://bt-df-lkhouse-lakehouse/framework/bt_df_lkhouse_fw.zip'

  # Build the container image (multi-stage: React + FastAPI)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/web:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/web:latest'
      - '-f'
      - 'Dockerfile.web'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/web:${_TAG}'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/web:latest'

  # Deploy to Cloud Run (separate service: sd-web)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sd-web'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/web:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},LLM_PROVIDER=bedrock,LLM_BASE_URL=${_LLM_BASE_URL},LLM_API_KEY=${_LLM_API_KEY},LLM_MODEL=${_LLM_MODEL},LLM_PROJECT=${_LLM_PROJECT},AWS_REGION=${_AWS_REGION},CONFIG_BUCKET=${_CONFIG_BUCKET},PROFILER_SERVICE_URL=${_PROFILER_URL}'

substitutions:
  _REGION: europe-west2
  _TAG: v1
  _LLM_BASE_URL: 'https://bedrock-mantle.eu-north-1.api.aws/v1'
  _LLM_API_KEY: ''  # Set via: --substitutions=_LLM_API_KEY=ABSK...
  _LLM_MODEL: 'openai.gpt-oss-120b'
  _LLM_PROJECT: 'default'
  _AWS_REGION: 'eu-north-1'
  _CONFIG_BUCKET: 'eastside-lakehouse'
  _PROFILER_URL: 'http://lakehouse-cluster-m:8090'

options:
  logging: CLOUD_LOGGING_ONLY
