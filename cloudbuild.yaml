steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/ui:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/ui:latest'
      - '-f'
      - 'Dockerfile.discovery'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/ui:${_TAG}'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/ui:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'semantic-discovery'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/semantic-discovery/ui:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},EMBEDDER_MODE=vertex,GEMINI_API_KEY=${_GEMINI_API_KEY}'

substitutions:
  _REGION: europe-west2
  _TAG: v1
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
